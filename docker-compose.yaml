version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mabcrm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mabcrm
      POSTGRES_USER: mabcrm
      POSTGRES_PASSWORD: mabcrm
    volumes:
      - mabcrm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mabcrm -d mabcrm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mabcrm_postgres_data:
